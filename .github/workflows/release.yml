name: Release

on:
  push:
    branches:
      - main
    paths:
      - "custom_components/**"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get current version
        id: current
        run: |
          version=$(jq -r .version custom_components/dial_a_story/manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Bump patch version
        id: bump
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.current.outputs.version }}"
          new_version="${major}.${minor}.$((patch + 1))"
          echo "version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Update manifest for release zip
        run: |
          jq --arg v "${{ steps.bump.outputs.version }}" '.version = $v' \
            custom_components/dial_a_story/manifest.json > tmp.json
          mv tmp.json custom_components/dial_a_story/manifest.json

      - name: Pick release name
        id: name
        run: |
          names=(
            "Adventurous Aardvark"
            "Brave Bunny"
            "Curious Cat"
            "Dreamy Dragon"
            "Enchanted Elephant"
            "Friendly Firefly"
            "Gentle Giraffe"
            "Happy Hedgehog"
            "Imaginative Iguana"
            "Jolly Jellyfish"
            "Kind Koala"
            "Luminous Llama"
            "Magical Moonbeam"
            "Noble Narwhal"
            "Optimistic Owl"
            "Playful Penguin"
            "Quiet Quokka"
            "Radiant Rabbit"
            "Sleepy Starfish"
            "Tender Turtle"
            "Upbeat Unicorn"
            "Valiant Vole"
            "Whimsical Whale"
            "Xtra Xenops"
            "Yawning Yak"
            "Zany Zebra"
          )
          patch=$(echo "${{ steps.bump.outputs.version }}" | cut -d. -f3)
          index=$(( patch % ${#names[@]} ))
          echo "name=${names[$index]}" >> "$GITHUB_OUTPUT"

      - name: Create release zip
        run: |
          cd custom_components/dial_a_story
          zip -r ../../dial-a-story.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ steps.bump.outputs.version }}"
          name: "v${{ steps.bump.outputs.version }} - ${{ steps.name.outputs.name }}"
          files: dial-a-story.zip
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
